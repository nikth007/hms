name: Deploy tracker to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish site files to gh-pages
        run: |
          mkdir site
          cp index.html SMF_SD_Mobilisation_Tracker.html site/
          sed -i "s/__BUILD__/${GITHUB_SHA}/" site/SMF_SD_Mobilisation_Tracker.html
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish tracker from ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
